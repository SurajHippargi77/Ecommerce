<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sunny Shop - Simple Frontend</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="logo">Sunny Shop</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero-section">
      <div class="hero-text">
        <h1 class="hero-title">Built for the Road</h1>
        <p class="hero-sub">Premium car essentials. Engineered to perform.</p>
      </div>
      <div class="car-blueprint">
        <div class="blueprint-grid"></div>
        <div class="car-body"></div>
        <div class="car-part" data-part="wheels">
          <div class="wheel wheel-fl"></div>
          <div class="wheel wheel-fr"></div>
          <div class="wheel wheel-rl"></div>
          <div class="wheel wheel-rr"></div>
        </div>
        <div class="car-part" data-part="engine">
          <div class="engine-block"></div>
          <div class="engine-lines">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>
        <div class="car-part" data-part="headlights">
          <div class="headlight headlight-l"></div>
          <div class="headlight headlight-r"></div>
        </div>
        <div class="car-part" data-part="exhaust">
          <div class="exhaust-pipe"></div>
          <div class="exhaust-smoke">
            <span></span><span></span><span></span>
          </div>
        </div>
        <div class="car-part" data-part="interior">
          <div class="steering-wheel"></div>
          <div class="dashboard"></div>
        </div>
        <div class="scan-line"></div>
      </div>
    </section>
    <section>
      <h2>Car Essentials</h2>
      <div id="products" class="grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 Sunny Shop — demo frontend</div>
  </footer>

  <script src="js/app.js"></script>
  <script src="css/animations.js"></script>
</body>
</html>
